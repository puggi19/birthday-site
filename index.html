<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Sayfa</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* intro */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

#logo{
  font-size:32px;
  color:#e50914;
  animation:intro 3s ease forwards;
}

@keyframes intro{
  0%{opacity:0;transform:scale(0.7)}
  100%{opacity:0}
}

/* lock */
#lock{display:none;flex-direction:column}

input{
  padding:10px;
  margin-top:10px;
}

button{
  margin-top:10px;
}

/* content */
#content{display:none;max-width:600px}

</style>
</head>

<body>

<div id="intro">
  <div id="logo">Doğum günün kutlu olsun Çatlak fıstık</div>
</div>

<div id="lock">
  <h2>Bu sayfa özel 🔐</h2>
  <p style="font-size:12px">İpucu: 6 haneli tarih</p>
  <input id="pass" type="password">
  <button onclick="check()">Giriş</button>
</div>

<div id="content">
  <h1>İyi ki doğdun 🎂</h1>
  <p id="text"></p>
</div>

<script>

const message = `İyi ki doğdun 

Asya...

Bazen bazı insanlar hayatımıza çok uzun süreler boyunca değil,
çok kısa anlarda girer ama etkisi uzun süre kalır.

Sen de benim için öyle bir iz bıraktın.

Kısa bir zaman içinde yaşanan şeyler,
bazen uzun bir zamana bedel olur.

Gülüşlerin, konuşmaların ve bıraktığın o his...
kolay kolay silinmiyor.

Ne olursa olsun,
bu hikâyenin bir yerinde sen hep özel kalacaksın.

İyi ki doğdun.`;

let i = 0;

function type(){
  if(i < message.length){
    let c = message[i];
    if(c === "\n"){
      document.getElementById("text").innerHTML += "<br>";
    } else {
      document.getElementById("text").innerHTML += c;
    }
    i++;
    setTimeout(type, 70);
  }
}

window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },3000);
};

function check(){
  if(document.getElementById("pass").value === "290704"){
    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";
    type();
  }
}

</script>

</body>
</html>
