<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Özel Sayfa</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:#fff;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 60%, rgba(0,0,0,0.95) 100%);
      z-index:5;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:6;
      opacity:0.08;
      background-image:url('https://www.transparenttextures.com/patterns/noise.png');
    }

    #intro{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:50;
    }

    #logo{
      font-size:38px;
      font-weight:bold;
      color:#e50914;
      animation:netflixIntro 2.8s ease forwards;
    }

    @keyframes netflixIntro{
      0%{opacity:0;transform:scale(0.7);filter:blur(8px)}
      100%{opacity:0}
    }

    #lockScreen{
      position:fixed;
      inset:0;
      background:#000;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:20;
    }

    input{
      padding:12px;
      border-radius:10px;
      border:none;
      text-align:center;
      margin-top:10px;
    }

    button{
      margin-top:10px;
      padding:10px 15px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .box{max-width:650px;padding:25px;z-index:10}
    .hidden{display:none}

    .show{animation:fadeIn 1s ease}

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    #adminPanel{
      display:none;
      position:fixed;
      inset:0;
      background:#111;
      overflow:auto;
      padding:20px;
      z-index:999;
    }

    .logItem{
      background:#222;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      font-size:12px;
    }
  </style></head>
<body><div id="intro">
  <div id="logo">Doğum günün kutlu olsun</div>
</div><div id="lockScreen">
  <h2>Bu sayfa özel 🔐</h2>
  <input type="password" id="password" placeholder="Şifre" />
  <button onclick="checkPassword()">Giriş</button>
</div><div class="box hidden" id="content">
  <h1>İyi ki doğdun 🎂</h1>
  <p id="story"></p>
</div><div id="adminPanel">
  <h2>Admin Log Panel</h2>
  <div id="logs"></div>
</div><script>
const text = "Asya...\nKısa bir hikaye...\nİyi ki doğdun.";
let i = 0;

function typeWriter(){
  if(i < text.length){
    document.getElementById("story").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,30);
  }
}

window.onload = function(){
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lockScreen").style.display="flex";
  },2000);

  if(window.location.search.includes("admin")){
    document.getElementById("adminPanel").style.display="block";
    loadLogs();
  }
};

function checkPassword(){
  const pass=document.getElementById("password").value;

  if(pass==="290704"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("content").classList.remove("hidden");
    document.getElementById("content").classList.add("show");

    typeWriter();
    logLogin();
  } else {
    alert("Yanlış şifre");
  }
}

// 📊 FIREBASE / LOG SYSTEM (REST)
const DB_URL = "https://YOUR-FIREBASE.firebaseio.com/logs.json";

function logLogin(){
  const data = {
    time: new Date().toISOString(),
    device: navigator.userAgent
  };

  fetch(DB_URL, {
    method:"POST",
    body: JSON.stringify(data)
  });
}

function loadLogs(){
  fetch(DB_URL)
    .then(res=>res.json())
    .then(data=>{
      const logsDiv=document.getElementById("logs");
      logsDiv.innerHTML="";

      for(let key in data){
        const log=document.createElement("div");
        log.className="logItem";
        log.innerText=`Zaman: ${data[key].time}\nCihaz: ${data[key].device}`;
        logsDiv.appendChild(log);
      }
    });
}
</script></body>
</html>
