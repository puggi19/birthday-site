<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Özel Sayfa</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  font-family:Arial;
  -webkit-text-size-adjust:100%;
}

/* 🎬 INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 📱 LOGO SAFE */
#logo{
  font-family:'Bebas Neue', sans-serif;
  font-size:clamp(28px, 8vw, 60px);
  padding:0 20px;
  max-width:100%;
  word-break:break-word;
  color:#e50914;
  text-shadow:0 0 15px #e50914, 0 0 40px #e50914;
  animation:intro 5s ease forwards;
}

@keyframes intro{
  0%{opacity:0;transform:scale(0.5);filter:blur(15px)}
  20%{opacity:1;transform:scale(1.1);filter:blur(2px)}
  50%{opacity:1;filter:blur(0)}
  100%{opacity:0;transform:scale(1.2)}
}

/* 🔐 LOCK */
#lock{
  display:none;
  flex-direction:column;
}

input{
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* 📜 CONTENT (FIXED LAYOUT) */
#content{
  display:none;
  max-width:600px;
  padding:80px 20px 20px 20px; /* 🔥 ÜST BOŞLUK ARTTI */
  line-height:1.7;
  word-break:break-word;
  -webkit-font-smoothing:antialiased;
  transition:all 2.5s ease;
}

/* 💌 TEXT */
#text{
  font-size:16px;
  letter-spacing:0.2px;
  line-height:1.6;
  white-space:pre-wrap;
}

/* 🎥 END EFFECT */
#content.end-effect{
  transform:scale(1.15);
  filter:blur(6px);
  opacity:0.4;
}

/* 🎧 MUSIC BUTTON (SAFE POSITION) */
#musicBtn{
  position:fixed;
  bottom:30px;
  right:20px;
  z-index:999;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff4d6d,#4cc9f0);
  color:white;
  cursor:pointer;
}

/* 🎬 ENDING */
#ending{
  position:fixed;
  inset:0;
  background:#000;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  opacity:0;
  pointer-events:none;
  transition:opacity 2s ease;
  z-index:20;
}

/* 🌑 BLACK FADE */
#fadeBlack{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  transition:opacity 2.5s ease;
  pointer-events:none;
  z-index:30;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="intro">
  <div id="logo">DOĞUM GÜNÜN KUTLU OLSUN</div>
</div>

<div id="lock">
  <h2>Bu sayfa sana özel 🔐</h2>
  <p style="font-size:12px;opacity:0.7">İpucu: 4 haneli eski şifre</p>
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="check()">Giriş</button>
</div>

<div id="content">
  <h1>İyi ki doğdun 🎂</h1>
  <p id="text"></p>
</div>

<div id="ending">
  <h2>Sonsuza kadar aklımda kalacaksın...</h2>
</div>

<div id="fadeBlack"></div>

<button id="musicBtn" onclick="toggleMusic()">🎧 Müziği Başlat</button>

<script>

// 💌 MESSAGE
const message = `Asya...

Bazen bazı insanlar hayatımıza uzun süre kalmak için değil,
çok kısa anlarda girip uzun izler bırakmak için gelir.

Sen de benim hayatımda böyle bir yer bıraktın.

Gülüşünü hatırlamak,
Doya doya sarılmayı hatırlamak,
insanın içindeki en ufak yeri bile değiştirebiliyor.

Seninle geçen o kısa zaman,
uzun yıllara sığacak kadar değerliydi.

Bir daha seni rahatsız etmeyeceğimi söylemiştim ama doğum günün senin için önemli olduğu için yazmak istedim. Rahatsız ettiysem gerçekten özür dilerim.

İyi ki doğdun çatlak fıstık...`;

// ✍️ TYPE
let i=0;
let textEl=document.getElementById("text");

function type(){
  if(i<message.length){
    let c=message[i];
    textEl.innerHTML += (c === "\n") ? "<br>" : c;
    i++;
    setTimeout(type,60);
  } else {
    setTimeout(showEnding,2500);
  }
}

// 🎬 END EFFECT
function showEnding(){
  const end=document.getElementById("ending");
  const content=document.getElementById("content");
  const fade=document.getElementById("fadeBlack");

  content.classList.add("end-effect");

  setTimeout(()=>{ end.style.opacity=1; },800);
  setTimeout(()=>{ fade.style.opacity=1; },2500);
}

// 🎧 MUSIC
let music=document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
  if(!playing){
    music.volume=0.4;
    music.play().catch(()=>{});
    playing=true;
    document.getElementById("musicBtn").innerText="⏸ Müziği Durdur";
  } else {
    music.pause();
    playing=false;
    document.getElementById("musicBtn").innerText="🎧 Müziği Başlat";
  }
}

// 🔐 LOGIN
function check(){
  if(document.getElementById("pass").value==="3007"){
    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";
    type();
  } else {
    alert("Yanlış şifre ❌");
  }
}

// 🚀 INTRO
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },5000);
};

</script>

</body>
</html>
