<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Sayfa</title>

<!-- 🔥 NETFLIX TARZI FONT -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  font-family:Arial;
}

/* 🎬 INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 🔥 NETFLIX STYLE LOGO */
#logo{
  font-family:'Bebas Neue', sans-serif;
  font-size:64px;
  letter-spacing:3px;
  color:#e50914;
  text-shadow:0 0 15px #e50914, 0 0 40px #e50914;
  animation:netflix 5s ease forwards;
}

/* 🎬 NETFLIX ANIMATION */
@keyframes netflix{
  0%{
    opacity:0;
    transform:scale(0.5);
    filter:blur(15px);
  }
  20%{
    opacity:1;
    transform:scale(1.1);
    filter:blur(2px);
  }
  40%{
    transform:scale(1);
    filter:blur(0);
    text-shadow:0 0 25px #e50914, 0 0 60px #e50914;
  }
  70%{opacity:1;}
  100%{
    opacity:0;
    transform:scale(1.2);
    text-shadow:none;
  }
}

/* 🔐 LOCK */
#lock{
  display:none;
  flex-direction:column;
}

input{
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* 📜 CONTENT */
#content{
  display:none;
  max-width:600px;
  padding:20px;
}
</style>
</head>

<body>

<div id="intro">
  <div id="logo">DOĞUM GÜNÜN KUTLU OLSUN</div>
</div>

<div id="lock">
  <h2>Bu sayfa özel 🔐</h2>
  <p style="font-size:12px;opacity:0.7">İpucu: 6 haneli özel tarih</p>
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="check()">Giriş</button>
</div>

<div id="content">
  <h1>İyi ki doğdun 🎂</h1>
  <p id="text"></p>
</div>

<script>

// 🎬 MESAJ
const message = `İyi ki doğdun 🤍

Asya...

Bazen bazı insanlar hayatımıza çok uzun süreler boyunca değil,
çok kısa anlarda girer ama etkisi uzun süre kalır.

Sen de benim için öyle bir iz bıraktın.

Kısa bir zaman içinde yaşanan şeyler,
bazen uzun bir zamana bedel olur.

Gülüşlerin, konuşmaların ve bıraktığın o his...
kolay kolay silinmiyor.

Ne olursa olsun,
bu hikâyenin bir yerinde sen hep özel kalacaksın.

İyi ki doğdun.`;

// ⚡ DAHA HIZLI TYPE EFFECT
let i = 0;
function type(){
  if(i < message.length){
    let c = message[i];

    if(c === "\n"){
      document.getElementById("text").innerHTML += "<br>";
    } else {
      document.getElementById("text").innerHTML += c;
    }

    i++;
    setTimeout(type, 40); // 🔥 hızlandı
  }
}

// 🚀 INTRO SÜRE
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },5000);
};

// 🔐 LOGIN
function check(){
  if(document.getElementById("pass").value === "290704"){

    logUser();

    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";

    type();
  } else {
    alert("Yanlış şifre ❌");
  }
}

// 🔥 FIREBASE LOG
const DB_URL = "https://dogum-d1b8a-default-rtdb.europe-west1.firebasedatabase.app/logs.json";

function logUser(){
  try{
    fetch(DB_URL,{
      method:"POST",
      body:JSON.stringify({
        time:new Date().toLocaleString(),
        device:navigator.userAgent
      })
    });
  }catch(e){}
}

</script>

</body>
</html>
