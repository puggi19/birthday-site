<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özel Sayfa</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
  font-family:Arial;
}

/* 🎉 CONFETTI */
.confetti{
  position:fixed;
  width:6px;
  height:6px;
  top:-10px;
  opacity:0.5;
  animation:fall linear infinite;
  z-index:-1;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(360deg);}
}

/* 🎬 INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

#logo{
  font-family:'Bebas Neue', sans-serif;
  font-size:60px;
  color:#e50914;
  text-shadow:0 0 15px #e50914, 0 0 40px #e50914;
  animation:intro 5s ease forwards;
}

@keyframes intro{
  0%{opacity:0;transform:scale(0.5);filter:blur(15px)}
  20%{opacity:1;transform:scale(1.1);filter:blur(2px)}
  50%{opacity:1;filter:blur(0)}
  100%{opacity:0;transform:scale(1.2)}
}

/* 🔐 LOCK */
#lock{
  display:none;
  flex-direction:column;
}

input{
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* 📜 CONTENT */
#content{
  display:none;
  max-width:600px;
  padding:20px;
  line-height:1.6;
}

/* 🔇 MUSIC BUTTON (SADE) */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  z-index:10;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎉 CONFETTI -->
<div id="confetti"></div>

<!-- 🎧 MUSIC -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎬 INTRO -->
<div id="intro">
  <div id="logo">DOĞUM GÜNÜN KUTLU OLSUN</div>
</div>

<!-- 🔐 LOCK -->
<div id="lock">
  <h2>Bu sayfa sana özel 🔐</h2>
  <p style="font-size:12px;opacity:0.7">İpucu: Eski telefon şifren (4 haneli)</p>
  <input id="pass" type="password" placeholder="Şifre">
  <button onclick="check()">Giriş</button>
</div>

<!-- 📜 CONTENT -->
<div id="content">
  <h1>İyi ki doğdun 🎂</h1>
  <p id="text"></p>
</div>

<!-- 🔇 MUSIC BUTTON (SADECE DURDUR) -->
<button id="musicBtn" onclick="stopMusic()">🔇 Müziği Durdur</button>

<script>

// 🎉 CONFETTI
function createConfetti(){
  for(let i=0;i<45;i++){
    let c=document.createElement("div");
    c.classList.add("confetti");

    c.style.left=Math.random()*100+"vw";
    c.style.background=randomColor();
    c.style.animationDuration=(4+Math.random()*4)+"s";
    c.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(c);
  }
}

function randomColor(){
  const colors=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0","#f72585","#aaa"];
  return colors[Math.floor(Math.random()*colors.length)];
}

createConfetti();

// 💌 MESSAGE
const message = `****...

Bazen bazı insanlar hayatımıza uzun süre kalmak için değil,
çok kısa anlarda girip uzun izler bırakmak için gelir.

Sen de benim hayatımda böyle bir yer bıraktın.

Bazen bir gülüş, bazen bir konuşma,
insanın içindeki en sakin yeri bile değiştirebiliyor.

Seninle geçen o kısa zaman,
uzun yıllara sığacak kadar değerliydi.

İyi ki doğdun...`;

// ✍️ TYPE EFFECT
let i=0;
function type(){
  if(i<message.length){
    document.getElementById("text").innerHTML+=
      (message[i]==="\n"?"<br>":message[i]);

    i++;
    setTimeout(type,50);
  }
}

// 🖥️ FULLSCREEN (login içinde çağrılıyor)
function openFullscreen(){
  let elem=document.documentElement;
  if(elem.requestFullscreen){
    elem.requestFullscreen().catch(()=>{});
  }
}

// 🎧 AUTO MUSIC TRY (SAYFA AÇILINCA)
let music=document.getElementById("bgMusic");

window.addEventListener("load", ()=>{
  music.volume=0.4;
  let p=music.play();
  if(p!==undefined){
    p.catch(()=>console.log("Autoplay blocked"));
  }
});

// 🔇 SADECE DURDUR
function stopMusic(){
  music.pause();
}

// 🚀 INTRO
window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lock").style.display="flex";
  },5000);
};

// 🔐 LOGIN
function check(){
  if(document.getElementById("pass").value==="3007"){

    logUser();

    openFullscreen();

    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";

    type();

  } else {
    alert("Yanlış şifre ❌");
  }
}

// 🔥 FIREBASE LOG
const DB_URL="https://dogum-d1b8a-default-rtdb.europe-west1.firebasedatabase.app/logs.json";

function logUser(){
  fetch(DB_URL,{
    method:"POST",
    body:JSON.stringify({
      time:new Date().toLocaleString(),
      device:navigator.userAgent
    })
  }).catch(()=>{});
}

</script>

</body>
</html>
