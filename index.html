<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Özel Sayfa PRO</title>  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:#fff;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 60%, rgba(0,0,0,0.95) 100%);
      z-index:5;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:6;
      opacity:0.07;
      background-image:url('https://www.transparenttextures.com/patterns/noise.png');
    }

    #intro{
      position:fixed;
      inset:0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:50;
    }

    #logo{
      font-size:36px;
      font-weight:bold;
      color:#e50914;
      animation:intro 2.5s ease forwards;
      text-align:center;
      padding:0 20px;
    }

    @keyframes intro{
      0%{opacity:0;transform:scale(0.7);filter:blur(8px)}
      100%{opacity:0}
    }

    #lockScreen{
      position:fixed;
      inset:0;
      background:#000;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      z-index:20;
    }

    input{
      padding:12px;
      border-radius:10px;
      border:none;
      text-align:center;
      margin-top:10px;
      outline:none;
    }

    button{
      margin-top:10px;
      padding:10px 15px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .box{
      max-width:650px;
      padding:25px;
      z-index:10;
      position:relative;
    }

    .hidden{display:none}
    .show{animation:fadeIn 1s ease}

    @keyframes fadeIn{
      from{opacity:0}
      to{opacity:1}
    }

    #adminPanel{
      display:none;
      position:fixed;
      inset:0;
      background:#111;
      overflow:auto;
      padding:20px;
      z-index:999;
    }

    .log{
      background:#222;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      font-size:12px;
    }
  </style></head>
<body><div id="intro">
  <div id="logo">Doum günün kutlu olsun</div>
</div><div id="lockScreen">
  <h2>Bu sayfa özel </h2>
  <p>pucu: 6 haneli tarih</p>
  <input type="password" id="password" placeholder="ifre" />
  <button onclick="login()">Giri</button>
</div><div class="box hidden" id="content">
  <h1>yi ki dodun </h1>
  <p id="story"></p>
</div><div id="adminPanel">
  <h2>Admin Log Panel</h2>
  <div id="logs"></div>
</div><script>
const text = `Asya...\n\nKsa bir hikaye gibi ama etkili bir iz braktn.\n\nyi ki dodun.`;

let i = 0;

function typeWriter(){
  if(i < text.length){
    document.getElementById("story").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,30);
  }
}

window.onload = function(){
  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("lockScreen").style.display="flex";
  },2000);

  if(window.location.search.includes("admin")){
    document.getElementById("adminPanel").style.display="block";
    loadLogs();
  }
};

function login(){
  const pass = document.getElementById("password").value;

  if(pass === "290704"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("content").classList.remove("hidden");
    document.getElementById("content").classList.add("show");

    typeWriter();
    logUser();
    openFullscreen();
  } else {
    alert("Yanl ifre ");
  }
}

function openFullscreen(){
  const e=document.documentElement;
  if(e.requestFullscreen) e.requestFullscreen();
}

/* LOG SYSTEM */
const DB_URL = "https://YOUR-PROJECT.firebaseio.com/logs.json";

function logUser(){
  const data = {
    time: new Date().toISOString(),
    device: navigator.userAgent
  };

  fetch(DB_URL, {
    method:"POST",
    body: JSON.stringify(data)
  });
}

function loadLogs(){
  fetch(DB_URL)
    .then(r=>r.json())
    .then(data=>{
      const logs=document.getElementById("logs");
      logs.innerHTML="";

      for(let k in data){
        const div=document.createElement("div");
        div.className="log";
        div.innerText = `Zaman: ${data[k].time}\nCihaz: ${data[k].device}`;
        logs.appendChild(div);
      }
    });
}
</script></body>
</html>
